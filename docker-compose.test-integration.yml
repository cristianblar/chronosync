##
# Integration test environment.
# Runs backend tests against a real TimescaleDB + Redis instance.
# Usage:
#   docker compose -f docker-compose.test-integration.yml up --build --abort-on-container-exit
#   docker compose -f docker-compose.test-integration.yml down -v
##
version: "3.9"

networks:
  chronosync_test:
    driver: bridge

volumes:
  postgres_test_data:
  redis_test_data:

services:
  db_test:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_db
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - chronosync_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis_test:
    image: redis:7-alpine
    volumes:
      - redis_test_data:/data
    networks:
      - chronosync_test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api_test:
    build:
      context: ./backend
      target: test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/test_db
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/test_db
      REDIS_URL: redis://redis_test:6379/0
      TEST_REDIS_URL: redis://redis_test:6379/0
      JWT_SECRET_KEY: test-integration-secret-key
      ENABLE_SCHEDULER: "false"
      DISABLE_RATE_LIMIT: "true"
      ENVIRONMENT: test
      RESEND_API_KEY: ""
      ONESIGNAL_APP_ID: ""
      GOOGLE_CLIENT_ID: ""
      # Ensure Alembic/pytest can import `app.*`
      PYTHONPATH: /app
    depends_on:
      db_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    networks:
      - chronosync_test
    command: ["/bin/sh", "-c", "alembic upgrade head && pytest tests/ -q --tb=short -p no:warnings"]
    volumes:
      - ./backend/coverage-reports:/app/coverage-reports
