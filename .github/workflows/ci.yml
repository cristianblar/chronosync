name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: npm audit (report)
        if: always()
        run: npm audit --json > audit.json || true
      - name: npm audit (gate)
        run: npm audit --audit-level=high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit
          path: frontend/audit.json
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check app tests
      - run: uv run mypy --config-file pyproject.toml app/utils/tracking_metrics.py app/utils/meq_scoring.py
      - run: mkdir -p coverage-reports
      - run: |
          uv run pytest tests/unit -q \
            --cov=app.services.optimization \
            --cov=app.utils.meq_scoring \
            --cov=app.utils.tracking_metrics \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-reports/coverage.xml \
            --cov-report=html:coverage-reports/html \
            --cov-fail-under=70
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage-reports
