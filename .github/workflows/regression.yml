name: regression
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly
  push:
    branches: [main]
jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Run backend integration tests (Docker)
        run: |
          set -o pipefail
          docker compose -f docker-compose.test-integration.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from api_test
      - name: Upload backend coverage from integration suite
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage
          path: backend/coverage-reports
      - name: Cleanup integration environment
        if: always()
        run: docker compose -f docker-compose.test-integration.yml down -v
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm --prefix frontend ci
      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps
      - name: Start E2E stack
        run: docker compose -f docker-compose.test-e2e.yml up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8001/api/v1/health/live || true)
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          exit 1
      - name: Wait for Web
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/ || true)
            [ "$code" = "200" ] || [ "$code" = "307" ] && exit 0
            sleep 3
          done
          exit 1
      - name: Run Playwright E2E
        env:
          BASE_URL: http://localhost:3001
          API_URL: http://localhost:8001
          MAILHOG_URL: http://localhost:8026
        run: npm --prefix frontend run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
      - name: Cleanup E2E environment
        if: always()
        run: docker compose -f docker-compose.test-e2e.yml down -v
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps (backend + frontend)
        run: |
          make install-back
          make install-front
      - name: Run security suite
        run: make test-security
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            reports/npm-audit
            reports/zap
  performance:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps (backend + frontend)
        run: |
          make install-back
          make install-front
      - name: Run perf suite
        run: make test-perf
      - name: Upload perf reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-reports
          path: |
            reports/lighthouse
            reports/locust
            reports/benchmarks
